{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block guest %}
<div class="d-flex align-items-center justify-content-center" style="min-height:100vh; background:linear-gradient(135deg,#0d2238,#1a3a5c);">
  <div class="card shadow" style="width: 380px;">
    <div class="card-body p-4">
      <h4 class="mb-1"><i class="bi bi-airplane-fill text-primary"></i> {{ AGENCY_NAME }}</h4>
      <p class="text-muted small mb-3">Travel CRM Login</p>
      <form method="post">{% csrf_token %}
        {% if form.errors %}<div class="alert alert-danger py-2 small">Invalid username or password.</div>{% endif %}
        <div class="mb-2">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button class="btn btn-primary w-100">Sign in</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
